name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build artifacts
        run: python -m build

      - name: Smoke-test built wheel
        run: |
          set -euo pipefail
          wheel=(dist/*.whl)
          if [ "${#wheel[@]}" -ne 1 ]; then
            echo "Expected exactly one wheel artifact in dist/" >&2
            exit 1
          fi

          python -m venv /tmp/azurefox-release-smoke-venv
          /tmp/azurefox-release-smoke-venv/bin/pip install "${wheel[0]}"
          /tmp/azurefox-release-smoke-venv/bin/azurefox help >/dev/null
          AZUREFOX_FIXTURE_DIR=tests/fixtures/lab_tenant \
            /tmp/azurefox-release-smoke-venv/bin/azurefox \
            --outdir /tmp/azurefox-release-smoke \
            --output json \
            whoami \
            >/dev/null

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(dist/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist/" >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --generate-notes \
              --title "${GITHUB_REF_NAME}" \
              --verify-tag
          fi

  pypi-publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
